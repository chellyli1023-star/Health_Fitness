<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="app-shell" aria-live="polite">
      <header class="hero">
        <h1 id="raceName">太舞崇礼25K</h1>
        <div class="race-count">
          <strong id="daysRemaining">--</strong>
          <span>天</span>
          <small>距离比赛</small>
        </div>
      </header>

      <section class="card today-card" aria-label="今日训练">
        <div class="section-head">
          <p id="todayStatus">今天</p>
          <span id="recoveryPill">--</span>
        </div>
        <div class="today-main">
          <div>
            <h2 id="todayType">--</h2>
            <p id="todayContent">--</p>
          </div>
          <strong id="todayDuration">--</strong>
        </div>
      </section>

      <section class="card reason-card" aria-label="为什么这样安排">
        <div class="section-head compact-head">
          <p>为什么这样安排</p>
        </div>
        <ul id="todayReason" class="reason-list"></ul>
      </section>

      <section class="card week-card" aria-label="本周计划">
        <div class="section-head compact-head">
          <p id="weekLabel">Week 1 · 本周计划</p>
        </div>
        <div id="weekDays" class="week-days"></div>
      </section>

      <section class="card progress-card" aria-label="本周目标">
        <article class="metric">
          <span>跑量</span>
          <strong id="runningProgress">--</strong>
        </article>
        <article class="metric">
          <span>力量</span>
          <strong id="strengthProgress">--</strong>
        </article>
        <article class="metric">
          <span>长距离</span>
          <strong id="longRunProgress">--</strong>
        </article>
      </section>

      <section class="card adjustment-card" aria-label="AI最近一次调整">
        <div class="section-head compact-head">
          <p>AI 最近一次调整</p>
          <span id="adjustmentConfidence">--</span>
        </div>
        <div class="adjustment-body">
          <time id="adjustmentDate">--</time>
          <strong id="adjustmentChange">--</strong>
          <p id="adjustmentReason">--</p>
        </div>
      </section>
    </main>
